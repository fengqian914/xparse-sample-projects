services:
  - type: web
    name: clinical-trial-backend
    runtime: python
    rootDir: clinical-trial-recruit/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TEXTIN_APP_ID
        sync: false
      - key: TEXTIN_SECRET_CODE
        sync: false
      - key: AI_GATEWAY_URL
        sync: false
      - key: AI_GATEWAY_KEY
        sync: false
      - key: AI_GATEWAY_MODEL
        sync: false
      - key: OPENAI_API_BASE
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
